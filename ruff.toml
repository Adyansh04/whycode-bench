line-length = 100
src = ["workspace/src", "src"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[lint.isort]
combine-as-imports = true

[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort (import sorting)
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
]

ignore = [
    "E501", # line too long, handled by the formatter
]
